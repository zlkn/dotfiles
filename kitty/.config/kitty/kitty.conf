# Theme
include ./theme.conf

# Window Size
hide_window_decorations yes
remember_window_size  no
window_padding_width 5
initial_window_width  160c
initial_window_height 42c

# Tabbar
tab_bar_edge top
tab_bar_min_tabs 1
tab_bar_style custom
tab_bar_margin_height 6.0 4.0
active_tab_foreground #5f87ff
active_tab_background #f2f2f2
active_tab_font_style bold
inactive_tab_background #f2f2f2
tab_bar_background #f2f2f2


# Fontconfig
font_size 11.5
font_family      family='JetBrains Mono' style=Light
# Fix too thin text rendering
text_composition_strategy legacy
disable_ligatures cursor
modify_font underline_thickness 200%
modify_font underline_position 2
